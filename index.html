<!DOCTYPE html>
<html lang = "en">
<head>
  <meta charset = "UTF-8">
  <meta name = "viewport" content = "width=device-width, initial-scale = 1.0">
  <title>Fly to Cart Animation</title>
  <link rel = "stylesheet" href= " "https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel = "stylesheet" href = "style.css">
</head>
<body>

  <header>
<div class ="cart-icon-container" id = "card-btn">
<i class="fa-solid fa-basket-shopping"></i>
      <span class="cart-badge" id="cart-count">1</span>
    </div>
  </header>

  <main class="wrapper">
    <div class="product-card">
      <div class="image-container">
        <img src="https://i.ibb.co/v4b3XpG/sipzy-cola.png" alt="Classic Cola" id="product-img">
      </div>
      
      <div class="product-details">
        <h2 class="product-title">Classic Cola</h2>
        <p class="product-desc">
          Crisp, refreshing, and ice-cold. Experience the timeless taste with zero sugar and maximum flavor. Perfect for your everyday refreshment.
        </p>
        
        <div class="product-footer">
          <button class="add-to-cart-btn" id="add-to-cart">
            Add to cart <i class="fa-solid fa-cart-shopping"></i>
          </button>
          <span class="product-price">$2.99</span>
        </div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>

</header>
</body>
